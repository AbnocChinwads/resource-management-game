name: Build + Notify Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          docker build \
            -t ghcr.io/abnocchinwads/resource-management-game:${{ github.sha }} .

      - name: Push image
        run: |
          docker push ghcr.io/abnocchinwads/resource-management-game:${{ github.sha }}
      
      - name: Trigger home-server deploy
        run: |
          curl -X POST https://api.github.com/repos/Abnocchinwads/home-server/dispatches \
          -H "Authorization: Bearer ${{ secrets.HOME_SERVER_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -d '{
            "event_type": "resource-updated",
            "client_payload": {
              "sha": "${{ github.sha }}"
            }
          }'
