name: Build and Push Image

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          docker build \
            -t ghcr.io/abnocchinwads/resource-management-game:main \
            -t ghcr.io/abnocchinwads/resource-management-game:${{ github.sha }} \
            .

      - name: Push image
        run: |
          docker push ghcr.io/abnocchinwads/resource-management-game:main
          docker push ghcr.io/abnocchinwads/resource-management-game:${{ github.sha }}

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/apps

            sed -i "s/^RESOURCE_VERSION=.*/RESOURCE_VERSION=${{ github.sha }}/" .env

            ./deploy.sh
