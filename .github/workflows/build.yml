name: Build and Publish Image

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE

  dispatch:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Trigger home-server deploy
        run: |
          curl -X POST https://api.github.com/repos/abnocchinwads/home-server/dispatches \
          -H "Authorization: Bearer ${{ secrets.HOME_SERVER_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -d '{
            "event_type": "resource-updated",
            "client_payload": {
              "resource_sha": "${{ github.sha }}"
            }
          }'
