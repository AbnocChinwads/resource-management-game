name: Build + Push + Dispatch

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # ---- CI GUARD (portable) ----
      - name: Validate CI contract
        run: |
          set -euo pipefail

          OWNER="abnocchinwads"
          REPO="${{ github.event.repository.name }}"
          SHA="${{ github.sha }}"

          if [ -z "$SHA" ]; then
            echo "Missing SHA"
            exit 1
          fi

          echo "CI OK"

      # ---- LOGIN ----
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---- BUILD + PUSH ----
      - name: Build image
        run: |
          OWNER="abnocchinwads"
          REPO="${{ github.event.repository.name }}"
          IMAGE="ghcr.io/${OWNER}/${REPO}:${{ github.sha }}"

          docker build -t $IMAGE .
          docker push $IMAGE

      # ---- DISPATCH ----
      - name: Trigger deploy
        run: |
          curl -X POST https://api.github.com/repos/abnocchinwads/home-server/dispatches \
          -H "Authorization: Bearer ${{ secrets.HOME_SERVER_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -d '{
            "event_type": "'"${REPO}-updated"'",
            "client_payload": {
              "'"${REPO}_sha"'": "'"${{ github.sha }}"'"
            }
          }'
