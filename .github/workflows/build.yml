name: Build & Deploy Trigger

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USER }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        run: |
          OWNER="abnocchinwads"
          IMAGE="ghcr.io/$OWNER/resource-management-game:${GITHUB_SHA}"

          docker build -t $IMAGE .
          docker push $IMAGE

  dispatch:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Trigger deploy
        run: |
          curl -X POST https://api.github.com/repos/abnocchinwads/home-server/dispatches \
            -H "Authorization: Bearer ${{ secrets.HOME_SERVER_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -d '{
              "event_type": "service-updated",
              "client_payload": {
                "service": "resource",
                "sha": "${{ github.sha }}"
              }
            }'
